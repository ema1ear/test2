<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#dad2ce">
    <meta name="robots" content="{{ROBOTS}}">

    <title>{{TITLE}}</title>
    <meta name="description" content="{{DESCRIPTION}}">
    <meta name="author" content="Emanuel Rocha">
    <link rel="canonical" href="{{CANONICAL}}">
    <link rel="alternate" hreflang="ca" href="{{ALTERNATE_CA}}">
    <link rel="alternate" hreflang="es" href="{{ALTERNATE_ES}}">
    <link rel="alternate" hreflang="x-default" href="https://emanuelrocha.cat/ca/">

    <meta property="og:type" content="website">
    <meta property="og:locale" content="{{OG_LOCALE}}">
    <meta property="og:url" content="{{CANONICAL}}">
    <meta property="og:title" content="{{TITLE}}">
    <meta property="og:description" content="{{DESCRIPTION}}">
    <meta property="og:site_name" content="Emanuel Rocha">

    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{{TITLE}}">
    <meta name="twitter:description" content="{{DESCRIPTION}}">

    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin>
    <link href="https://api.fontshare.com/v2/css?f[]=switzer@400,500,700,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/styles.css">
    <script type="application/ld+json">{"@context":"https://schema.org","@type":"Person","name":"Emanuel Rocha","url":"https://emanuelrocha.cat/","email":"mailto:hola@emanuelrocha.cat","jobTitle":"Consultor de comunicación","knowsLanguage":["ca","es"],"address":{"@type":"PostalAddress","addressLocality":"Puigcerdà","addressRegion":"Catalunya","addressCountry":"ES"}}</script>
    <script type="module" src="/assets/app.js"></script>
</head>
<body data-state="{{INITIAL_STATE}}" data-route-key="{{ROUTE_KEY}}">
    <a class="visually-hidden skip-link" href="#main-content">{{SKIP_TEXT}}</a>

    <div class="app-container">
        <header class="main-header">
            <div class="brand-group">
                <h1><button type="button" class="brand-title" id="brand-home">Emanuel Rocha</button></h1>
                <p class="tag-line" id="brand-tag">{{TAG}}</p>
            </div>
        </header>

        <main class="content-viewport" id="main-content" tabindex="-1">
            <section class="view-welcome" id="view-welcome" aria-labelledby="node-welcome">
                <div class="axis-box" id="box-name" aria-hidden="true">
                    <h2 class="text-node">Emanuel Rocha</h2>
                </div>
                <div class="axis-box" id="box-welcome">
                    <h2 class="text-node" id="node-welcome">{{WELCOME_TITLE}}</h2>
                </div>
                <div class="welcome-fade-block">
                    <p class="interactive-prose" id="prose-text">{{WELCOME_HTML}}</p>
                </div>
            </section>

            <section class="view-narrative" id="teleprompter" aria-label="{{NARRATIVE_LABEL}}">
                <article class="narrative-text" id="narrative-content">{{NARRATIVE_HTML}}</article>
            </section>

            <section class="view-contact" id="view-contact" aria-labelledby="contact-heading">
                <h2 class="visually-hidden" id="contact-heading">{{CONTACT_HEADING}}</h2>
                <form class="contact-form" id="contact-form" novalidate>
                    <p class="interactive-prose" id="contact-prose-text">
                        <span id="form-lead">{{FORM_LEAD}}</span>
                        <label class="visually-hidden" for="form-name" id="form-name-label">{{NAME_LABEL}}</label>
                        <input type="text" id="form-name" name="name" class="inline-input" placeholder="{{NAME_PLACEHOLDER}}" autocomplete="name" maxlength="100" required>
                        <span id="form-bridge">{{FORM_BRIDGE}}</span>
                        <label class="visually-hidden" for="form-email" id="form-email-label">{{EMAIL_LABEL}}</label>
                        <input type="email" id="form-email" name="email" class="inline-input" placeholder="{{EMAIL_PLACEHOLDER}}" autocomplete="email" inputmode="email" maxlength="254" required>.
                        <span id="form-intent-lead">{{FORM_INTENT_LEAD}}</span>
                        <button type="button" id="choice-intent-A" class="form-choice-btn is-active" data-action="intent" data-intent="A">{{INTENT_A}}</button><span class="form-slash" aria-hidden="true">/</span><button type="button" id="choice-intent-B" class="form-choice-btn" data-action="intent" data-intent="B">{{INTENT_B}}</button><span id="form-dynamic-tail">{{TAIL_A}}</span>
                    </p>
                    <label class="visually-hidden" for="website">No rellenar este campo</label>
                    <input class="visually-hidden" type="text" id="website" name="website" autocomplete="off" tabindex="-1">
                    <input type="hidden" id="form-language" name="language" value="{{LANG}}">
                    <input type="hidden" id="form-intent" name="intent" value="A">
                    <button type="submit" class="visually-hidden">{{SUBMIT}}</button>
                    <p class="form-status" id="form-status" role="status" aria-live="polite"></p>
                </form>
            </section>

            <section class="view-operations" id="operations-view" aria-labelledby="operations-heading">
                <h2 class="visually-hidden" id="operations-heading">{{OPERATIONS_HEADING}}</h2>
                <p class="interactive-prose" id="operations-intro">{{OPERATIONS_INTRO}}</p>
                <div class="cabinet-system" id="cabinet-container">{{CABINET_HTML}}</div>
            </section>
        </main>

        <footer class="main-footer">
            <div class="footer-col-left">
                <button type="button" class="meta-text" id="btn-contact" data-action="contact">{{CONTACT}}</button>
                <button type="button" class="meta-text" id="btn-back" data-action="back">{{BACK}}</button>
            </div>

            <div class="footer-col-center">
                <button type="button" class="meta-text" id="btn-operations-footer" data-action="operations">{{OPERATIONS}}</button>
            </div>

            <div class="footer-col-right">
                <nav class="lang-selector-inline" id="lang-inline-container" aria-label="{{LANGUAGE_ARIA}}">
                    <button type="button" class="meta-text" id="lang-toggle" data-action="language-menu" aria-haspopup="true" aria-expanded="false">{{LANGUAGE_ACTIVE}}</button>
                    <div class="lang-options-slide" id="language-options" aria-hidden="true">
                        <button type="button" class="meta-text lang-opt" id="opt-ca" data-action="language" data-lang="ca" tabindex="-1" lang="ca">CA</button>
                        <span class="lang-divider-dot" aria-hidden="true">·</span>
                        <button type="button" class="meta-text lang-opt" id="opt-es" data-action="language" data-lang="es" tabindex="-1" lang="es">ES</button>
                    </div>
                </nav>
                <button type="button" class="meta-text" id="btn-cancel-contact" data-action="cancel">{{CANCEL}}</button>
            </div>
        </footer>
    </div>

    <noscript>
        <p>JavaScript és necessari per a l'experiència interactiva. Pots visitar les versions en <a href="/ca/">català</a> o <a href="/es/">castellano</a>, o escriure a <a href="mailto:hola@emanuelrocha.cat">hola@emanuelrocha.cat</a>.</p>
    </noscript>
</body>
</html>
